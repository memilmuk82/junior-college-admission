services:
  web:
    build: .
    environment:
      SECRET_KEY: "${SECRET_KEY:?SECRET_KEY must be set in .env}"
      DATABASE_URL: "${DATABASE_URL:?DATABASE_URL must be set in .env}"
    ports:
      - "5000:5000"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - backend
    restart: unless-stopped

  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: "${POSTGRES_DB:-admission}"
      POSTGRES_USER: "${POSTGRES_USER:-admission}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env}"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-admission} -d ${POSTGRES_DB:-admission}"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - backend
    restart: unless-stopped

networks:
  backend:
    driver: bridge

volumes:
  postgres_data:
