name: junior-college-admission-beta

services:
  web-beta:
    build: .
    command:
      - sh
      - -c
      - >-
        uv run --no-sync flask --app wsgi db upgrade &&
        uv run --no-sync flask --app wsgi auth bootstrap-admin &&
        exec gunicorn
        --bind=0.0.0.0:5000
        --workers=${BETA_WEB_WORKERS:-2}
        --threads=${BETA_WEB_THREADS:-2}
        --timeout=30
        --graceful-timeout=30
        --access-logfile=-
        --access-logformat='%(t)s "%(m)s %(U)s %(H)s" %(s)s %(b)s'
        --error-logfile=-
        wsgi:app
    environment:
      APP_ENV: beta
      SECRET_KEY: "${BETA_SECRET_KEY:?BETA_SECRET_KEY must be set}"
      DATABASE_URL: "${BETA_DATABASE_URL:?BETA_DATABASE_URL must be set}"
      TEMP_UPLOAD_ROOT: /var/lib/admission/uploads
      ADMIN_USERNAME: "${BETA_ADMIN_USERNAME:?BETA_ADMIN_USERNAME must be set}"
      ADMIN_PASSWORD_HASH: "${BETA_ADMIN_PASSWORD_HASH:?BETA_ADMIN_PASSWORD_HASH must be set}"
      BYOK_MASTER_KEY: "${BETA_BYOK_MASTER_KEY:?BETA_BYOK_MASTER_KEY must be set}"
      GOOGLE_OIDC_ENABLED: "${BETA_GOOGLE_OIDC_ENABLED:-false}"
      GOOGLE_OIDC_CLIENT_ID: "${BETA_GOOGLE_OIDC_CLIENT_ID:-}"
      GOOGLE_OIDC_CLIENT_SECRET: "${BETA_GOOGLE_OIDC_CLIENT_SECRET:-}"
      GOOGLE_REDIRECT_URI: "${BETA_GOOGLE_REDIRECT_URI:-}"
    ports:
      - "127.0.0.1:${BETA_WEB_PORT:-5002}:5000"
    depends_on:
      db-beta:
        condition: service_healthy
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - >-
          import urllib.request;
          urllib.request.urlopen('http://127.0.0.1:5000/health', timeout=3).read()
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - beta_uploads:/var/lib/admission/uploads
    tmpfs:
      - /tmp
    networks:
      - beta-backend
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    restart: unless-stopped
    stop_grace_period: 30s

  db-beta:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: "${BETA_POSTGRES_DB:-admission_beta}"
      POSTGRES_USER: "${BETA_POSTGRES_USER:-admission_beta}"
      POSTGRES_PASSWORD: "${BETA_POSTGRES_PASSWORD:?BETA_POSTGRES_PASSWORD must be set}"
    healthcheck:
      test:
        - CMD-SHELL
        - >-
          pg_isready -U ${BETA_POSTGRES_USER:-admission_beta}
          -d ${BETA_POSTGRES_DB:-admission_beta}
      interval: 3s
      timeout: 5s
      retries: 20
    volumes:
      - beta_postgres_data:/var/lib/postgresql/data
    networks:
      - beta-backend
    restart: unless-stopped
    stop_grace_period: 30s

networks:
  beta-backend:
    driver: bridge

volumes:
  beta_postgres_data:
  beta_uploads:
