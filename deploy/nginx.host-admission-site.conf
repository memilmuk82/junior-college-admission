server {
    listen 443 ssl;
    listen [::]:443 ssl ipv6only=on;
    server_name admission.memilmuk82.com;

    include /etc/nginx/snippets/admission-cloudflare-realip.conf;

    # $uri is path-only. The OAuth callback's code and state must never enter logs.
    access_log /var/log/nginx/admission.access.log admission_path_only;
    error_log /var/log/nginx/admission.error.log warn;

    limit_req_status 429;
    limit_req_log_level warn;
    client_max_body_size 30M;

    location = /demo {
        return 308 /demo/;
    }

    location ~ ^/demo/auth/(email/verify|password/reset)$ {
        error_log /var/log/nginx/admission.demo-account-token.error.log crit;
        limit_req zone=admission_auth_per_ip burst=10 nodelay;
        include /etc/nginx/snippets/admission-demo-proxy.conf;
    }

    location ~ ^/demo/(auth/(login|register|demo-start/(student|teacher|admin|assistant_admin)|google/start|google/demo-consent|email/resend|password/forgot)|account/security/(password|email|google/(connect|disconnect)))$ {
        limit_req zone=admission_auth_per_ip burst=10 nodelay;
        include /etc/nginx/snippets/admission-demo-proxy.conf;
    }

    location /demo/ {
        include /etc/nginx/snippets/admission-demo-proxy.conf;
    }

    location = /auth/google/callback {
        error_log /var/log/nginx/admission.callback.error.log crit;
        limit_req zone=admission_auth_per_ip burst=10 nodelay;
        include /etc/nginx/snippets/admission-proxy.conf;
    }

    # Query bearer tokens are omitted by the path-only access log. Suppress
    # request-bearing upstream errors for these fixed entrypoints as well.
    location ~ ^/auth/(email/verify|password/reset)$ {
        error_log /var/log/nginx/admission.account-token.error.log crit;
        limit_req zone=admission_auth_per_ip burst=10 nodelay;
        include /etc/nginx/snippets/admission-proxy.conf;
    }

    location ~ ^/(auth/(login|register|google/start|email/resend|password/forgot)|account/security/(password|email|google/(connect|disconnect))|admin/login)$ {
        limit_req zone=admission_auth_per_ip burst=10 nodelay;
        include /etc/nginx/snippets/admission-proxy.conf;
    }

    location / {
        include /etc/nginx/snippets/admission-proxy.conf;
    }

    ssl_certificate /etc/letsencrypt/live/admission.memilmuk82.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/admission.memilmuk82.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}

server {
    listen 80;
    listen [::]:80;
    server_name admission.memilmuk82.com;

    include /etc/nginx/snippets/admission-cloudflare-realip.conf;

    # HTTP callback attempts can also carry a query, so do not inherit combined logs.
    access_log /var/log/nginx/admission.access.log admission_path_only;
    error_log /var/log/nginx/admission.error.log warn;

    return 308 https://$host$request_uri;
}
