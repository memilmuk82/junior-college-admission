worker_processes auto;
pid /tmp/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    server_tokens off;

    log_format path_only '$time_local "$request_method $uri $server_protocol" '
                         '$status $body_bytes_sent';
    access_log /dev/stdout path_only;
    error_log /dev/stderr warn;
    limit_req_zone $binary_remote_addr zone=auth_per_ip:10m rate=20r/m;
    limit_req_status 429;
    limit_req_log_level warn;

    client_body_temp_path /tmp/client_temp;
    proxy_temp_path /tmp/proxy_temp;
    fastcgi_temp_path /tmp/fastcgi_temp;
    uwsgi_temp_path /tmp/uwsgi_temp;
    scgi_temp_path /tmp/scgi_temp;

    upstream admission_app {
        server web-production:5000;
        keepalive 16;
    }

    server {
        listen 8080 default_server;
        server_name _;

        location = /proxy-health {
            access_log off;
            default_type application/json;
            return 200 '{"status":"ok"}\n';
        }

        location / {
            return 308 https://$host$request_uri;
        }
    }

    server {
        listen 8443 ssl default_server;
        http2 on;
        server_name _;

        ssl_certificate /run/secrets/tls_certificate;
        ssl_certificate_key /run/secrets/tls_private_key;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_session_cache shared:TLS:10m;
        ssl_session_timeout 10m;
        ssl_session_tickets off;

        client_max_body_size 22m;
        client_body_timeout 30s;
        keepalive_timeout 30s;

        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "no-referrer" always;
        add_header X-Frame-Options "DENY" always;

        # Authorization codes and state arrive in this callback's query string.
        # Keep access logs path-only and suppress request-bearing upstream errors here.
        location = /auth/google/callback {
            access_log /dev/stdout path_only;
            error_log /dev/stderr crit;
            limit_req zone=auth_per_ip burst=10 nodelay;
            proxy_pass http://admission_app;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Port 443;
            proxy_connect_timeout 5s;
            proxy_send_timeout 30s;
            proxy_read_timeout 120s;
            proxy_hide_header Server;
        }

        # Password hashing is intentionally expensive. Bound every anonymous
        # login/registration entrypoint per source before it reaches the application.
        # Host-Nginx/Cloudflare deployments must apply an equivalent outer policy.
        location ~ ^/(auth/(login|register|google/start)|admin/login)$ {
            limit_req zone=auth_per_ip burst=10 nodelay;
            proxy_pass http://admission_app;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Port 443;
            proxy_connect_timeout 5s;
            proxy_send_timeout 30s;
            proxy_read_timeout 120s;
            proxy_hide_header Server;
        }

        location / {
            proxy_pass http://admission_app;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Port 443;
            proxy_connect_timeout 5s;
            proxy_send_timeout 30s;
            proxy_read_timeout 120s;
            proxy_hide_header Server;
        }
    }
}
