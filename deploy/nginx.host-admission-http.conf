# Loaded from nginx's http context via /etc/nginx/conf.d.
# Never add $request, $request_uri, $args, Referer, or another query-bearing value.
log_format admission_path_only
    '$remote_addr $host [$time_local] '
    '"$request_method $uri $server_protocol" $status $body_bytes_sent';

limit_req_zone $binary_remote_addr zone=admission_auth_per_ip:10m rate=20r/m;
