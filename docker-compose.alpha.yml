name: junior-college-admission-alpha

services:
  web-alpha:
    build: .
    command:
      - sh
      - -c
      - >-
        uv run --no-sync flask --app wsgi db upgrade &&
        exec uv run --no-sync flask --app wsgi run --host=0.0.0.0 --port=5000
    environment:
      SECRET_KEY: "${ALPHA_SECRET_KEY:?ALPHA_SECRET_KEY must be set}"
      DATABASE_URL: "${ALPHA_DATABASE_URL:?ALPHA_DATABASE_URL must be set}"
      TEMP_UPLOAD_ROOT: /var/lib/admission/uploads
      ADMIN_USERNAME: "${ALPHA_ADMIN_USERNAME:?ALPHA_ADMIN_USERNAME must be set}"
      ADMIN_PASSWORD_HASH: "${ALPHA_ADMIN_PASSWORD_HASH:?ALPHA_ADMIN_PASSWORD_HASH must be set}"
      BYOK_MASTER_KEY: "${ALPHA_BYOK_MASTER_KEY:?ALPHA_BYOK_MASTER_KEY must be set}"
    ports:
      - "127.0.0.1:${ALPHA_WEB_PORT:-5001}:5000"
    depends_on:
      db-alpha:
        condition: service_healthy
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - >-
          import urllib.request;
          urllib.request.urlopen('http://127.0.0.1:5000/health', timeout=3).read()
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - alpha_uploads:/var/lib/admission/uploads
    networks:
      - alpha-backend
    restart: unless-stopped

  db-alpha:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: "${ALPHA_POSTGRES_DB:-admission_alpha}"
      POSTGRES_USER: "${ALPHA_POSTGRES_USER:-admission_alpha}"
      POSTGRES_PASSWORD: "${ALPHA_POSTGRES_PASSWORD:?ALPHA_POSTGRES_PASSWORD must be set}"
    healthcheck:
      test:
        - CMD-SHELL
        - >-
          pg_isready -U ${ALPHA_POSTGRES_USER:-admission_alpha}
          -d ${ALPHA_POSTGRES_DB:-admission_alpha}
      interval: 3s
      timeout: 5s
      retries: 20
    volumes:
      - alpha_postgres_data:/var/lib/postgresql/data
    networks:
      - alpha-backend
    restart: unless-stopped

networks:
  alpha-backend:
    driver: bridge

volumes:
  alpha_postgres_data:
  alpha_uploads:
