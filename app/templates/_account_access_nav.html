{% if current_user %}
  <a href="{{ url_for('main.dashboard') }}">내 업무공간</a>
  <a href="{{ url_for('account.security') }}">계정 보안</a>
  <form class="account-access-nav-form" method="post" action="{{ url_for('auth.logout') }}">
    <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
    <button type="submit">로그아웃</button>
  </form>
{% else %}
  <a href="{{ url_for('auth.login') }}">로그인</a>
  <a href="{{ url_for('auth.register', account_type='student') }}">학생 회원가입</a>
  <a href="{{ url_for('auth.register', account_type='teacher') }}">교사 회원가입</a>
{% endif %}
